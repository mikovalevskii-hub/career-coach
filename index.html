<script>
var PROXY = '/api/chat';
var CAP = 15;

function today() { return new Date().toDateString(); }

function getUID() {
  var p = new URLSearchParams(window.location.search);
  var id = p.get('uid');
  if (!id) {
    id = 'demo_' + Math.random().toString(36).substr(2, 9);
    try { history.replaceState(null, '', '?uid=' + id); } catch(e) {}
  }
  return id;
}

function loadStore(id) {
  try {
    var raw = localStorage.getItem('ca4_' + id);
    if (raw) {
      var s = JSON.parse(raw);
      if (s.date !== today()) { s.date = today(); s.count = 0; }
      return s;
    }
  } catch(e) {}
  return { date: today(), count: 0, hist: [], qc: 0, done: false, report: '' };
}

function save() { try { localStorage.setItem('ca4_' + uid, JSON.stringify(store)); } catch(e) {} }
function rem() { return Math.max(0, CAP - (store.date === today() ? store.count : 0)); }

function show(id) {
  ['landing', 'chat-screen', 'report-screen', 'capped-screen'].forEach(function(s) {
    var el = document.getElementById(s);
    if (el) el.classList.remove('active');
  });
  var t = document.getElementById(id);
  if (t) t.classList.add('active');
}

var uid, store, hist, qc, busy;

function init() {
  uid = getUID();
  store = loadStore(uid);
  hist = store.hist || [];
  qc = store.qc || 0;
  busy = false;

  document.getElementById('start-btn').addEventListener('click', startSession);
  document.getElementById('sb').addEventListener('click', send);
  document.getElementById('mi').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  document.getElementById('mi').addEventListener('input', function() {
    this.style.height = '';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

  if (store.done && store.report) { showReport(store.report); }
  else if (rem() === 0) { showCapped(); }
  else { show('landing'); }
}

function startSession() {
  show('chat-screen');
  if (hist.length > 0) {
    hist.forEach(function(m) {
      addMsg(m.role === 'user' ? 'user' : 'assistant', m.content, true);
    });
    scrollDown();
    updateUI();
  } else {
    callAI('Begin the career discovery session. Welcome the user warmly in 1-2 sentences, briefly explain what this session will help them achieve, then ask your first question.');
  }
}

function send() {
  var inp = document.getElementById('mi');
  var txt = inp.value.trim();
  if (!txt || busy) return;
  if (rem() === 0) { showCapped(); return; }
  inp.value = '';
  inp.style.height = '';
  addMsg('user', txt, false);
  store.count++;
  save();
  updateUI();
  callAI(txt);
}

function callAI(userMsg) {
  busy = true;
  document.getElementById('sb').disabled = true;
  hideErr();
  hist.push({ role: 'user', content: userMsg });
  var typingEl = showTyping();

  fetch(PROXY, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages: hist })
  })
  .then(function(res) {
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  })
  .then(function(data) {
    removeTyping(typingEl);
    if (data.error) throw new Error(JSON.stringify(data.error));
    var text = data.content && data.content[0] && data.content[0].text;
    if (!text) throw new Error('No response');
    hist.push({ role: 'assistant', content: text });
    qc++;
    store.qc = qc;
    store.hist = hist;
    if (text.indexOf('---REPORT---') !== -1) {
      store.done = true;
      store.report = text;
      save();
      showReport(text);
    } else {
      save();
      addMsg('assistant', text, false);
      updateUI();
    }
  })
  .catch(function(e) {
    removeTyping(typingEl);
    hist.pop();
    showErr('Error: ' + e.message + '. Please try again.');
  })
  .finally(function() {
    busy = false;
    document.getElementById('sb').disabled = false;
  });
}

function fmt(t) {
  t = t.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\n/g, '<br>');
  return t;
}

function fmtReport(raw) {
  var clean = raw.replace('---REPORT---', '').replace('---END---', '').trim();
  clean = clean.replace(/^# (.+)$/gm, '<h1 style="font-family:\'Barlow Condensed\',sans-serif;font-size:clamp(22px,3vw,32px);font-weight:800;text-transform:uppercase;margin-bottom:20px;">$1</h1>');
  clean = clean.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  clean = clean.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  clean = clean.replace(/^- (.+)$/gm, '<p style="padding-left:14px;border-left:2px solid rgba(255,123,40,.4);margin:4px 0;">$1</p>');
  clean = clean.replace(/\n\n/g, '</p><p>');
  clean = clean.replace(/\n/g, '<br>');
  return clean;
}

function addMsg(role, text, instant) {
  var area = document.getElementById('msgs');
  var row = document.createElement('div');
  row.className = 'mr ' + (role === 'user' ? 'user' : 'c') + (instant ? ' fx' : '');
  var av = document.createElement('div');
  av.className = 'av ' + (role === 'user' ? 'u' : 'c');
  av.textContent = role === 'user' ? 'You' : 'CA';
  var bub = document.createElement('div');
  bub.className = 'bub';
  bub.innerHTML = fmt(text);
  row.appendChild(av);
  row.appendChild(bub);
  area.appendChild(row);
  scrollDown();
}

function showTyping() {
  var area = document.getElementById('msgs');
  var row = document.createElement('div');
  row.className = 'mr c';
  row.id = 'tr';
  var av = document.createElement('div');
  av.className = 'av c';
  av.textContent = 'CA';
  var bub = document.createElement('div');
  bub.className = 'bub';
  bub.innerHTML = '<div class="tdots"><div class="td"></div><div class="td"></div><div class="td"></div></div>';
  row.appendChild(av);
  row.appendChild(bub);
  area.appendChild(row);
  scrollDown();
  return row;
}

function removeTyping(el) { if (el && el.parentNode) el.parentNode.removeChild(el); }
function scrollDown() {
  var a = document.getElementById('msgs');
  setTimeout(function() { a.scrollTop = a.scrollHeight; }, 40);
}

function showReport(raw) {
  show('report-screen');
  document.getElementById('rdate').textContent = 'Generated ' + new Date().toLocaleDateString('en-AU', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  document.getElementById('report-content').innerHTML = fmtReport(raw);
}

function updateUI() {
  var r = rem();
  var el = document.getElementById('ctr');
  el.textContent = r + ' message' + (r !== 1 ? 's' : '') + ' remaining today';
  el.className = 'ctr' + (r <= 4 ? ' warn' : '');
  document.getElementById('pfill').style.width = Math.min(100, (qc / 20) * 100) + '%';
  var ph = qc < 8 ? 'Discovery' : qc < 16 ? 'Deep Dive' : 'Strategy';
  var n = qc < 8 ? 1 : qc < 16 ? 2 : 3;
  document.getElementById('phase').innerHTML = 'Phase <span>' + n + '</span> — ' + ph;
}

function showCapped() {
  show('capped-screen');
  function tick() {
    var now = new Date(), mid = new Date();
    mid.setHours(24, 0, 0, 0);
    var d = mid - now, h = Math.floor(d / 3600000), m = Math.floor((d % 3600000) / 60000);
    document.getElementById('rtick').textContent = 'Resets in ' + h + 'h ' + m + 'm';
  }
  tick();
  setInterval(tick, 60000);
}

function showErr(msg) {
  var e = document.getElementById('err');
  e.textContent = msg;
  e.style.display = 'block';
}
function hideErr() { document.getElementById('err').style.display = 'none'; }

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
